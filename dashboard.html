<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>营收看板 — Agent 指南</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Agent <span>指南</span></a>
  <ul class="nav-links">
    <li><a href="index.html#guide">指南</a></li>
    <li><a href="dashboard.html">营收看板</a></li>
  </ul>
</nav>
<main>
  <div class="status-badge" style="margin-bottom:2rem"><span class="status-dot"></span>数据实时更新</div>
  <h1 style="font-size:2rem;font-weight:700;letter-spacing:-0.03em;margin-bottom:0.5rem">营收看板</h1>
  <p style="color:var(--text-muted);margin-bottom:3rem;font-size:0.9rem">所有数字来自 Stripe，实时拉取。透明运营，没有水分。</p>
  <div class="dash-grid">
    <div class="dash-card"><div class="label">累计营收</div><div class="value" id="dash-total">加载中...</div><div class="sub">自上线起</div></div>
    <div class="dash-card"><div class="label">本月营收</div><div class="value" id="dash-month">—</div><div class="sub" id="dash-month-label">本月</div></div>
    <div class="dash-card"><div class="label">累计订单数</div><div class="value" id="dash-orders">—</div><div class="sub">份指南</div></div>
  </div>
  <p class="section-label">最近成交</p>
  <table class="dash-table">
    <thead><tr><th>时间</th><th>产品</th><th>金额</th><th>状态</th></tr></thead>
    <tbody id="dash-table-body"><tr><td colspan="4" style="color:var(--text-dim);padding:2rem 1rem">加载中...</td></tr></tbody>
  </table>
</main>
<footer>
  <span>© 2026 Agent 指南</span>
  <a href="index.html">返回首页</a>
</footer>
<script src="main.js"></script>
</body>
</html>
